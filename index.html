<!DOCTYPE html>
<html>
  <head>
    <!-- Start Comments --
    meta "http-equiv="refresh" is for page refresh
    content is refrech time in seconds, 60=1 minute
    -- End Comments -->
    <meta http-equiv="refresh" content="60">
    <style>
      html, body { margin:0; height:100%; background:black; overflow:hidden; }
      iframe { border:0; width:100%; height:100%; }
    </style>
  </head>

  <body style="background-color: black;">
     <!-- Start Comments --
    "https://docs.google.com/presentation/d/18pxa2_F-4ZgkItnPLW3rvD9_KaWlZ2JJtVhXHGJf3iM/" is the link to google slide 
    "embed?" is used for emebed slideshows
    "&loop=true" makes slideshow loop
    "&start=true" makes it automatically start
    "&rm=minimal" removed border around slideshow
    "&delayms=1000" how long for a slide to advance in milliseconds, 1000=1 second
    -- End Comments -->
    <iframe 
      src="https://docs.google.com/presentation/d/18pxa2_F-4ZgkItnPLW3rvD9_KaWlZ2JJtVhXHGJf3iM/embed?&loop=true&start=true&rm=minimal&delayms=1000" 
      width="100%" 
      height="100%" 
      Frameborder="0"
      >
    </frame>
  </body>
</html>
